name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pouser
          POSTGRES_PASSWORD: popassword
          POSTGRES_DB: poapproval_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://pouser:popassword@localhost:5432/poapproval_test
          DATABASE_URL_SYNC: postgresql://pouser:popassword@localhost:5432/poapproval_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-only
          JWT_SECRET: test-jwt-secret-for-ci-only
          FIRST_SUPERUSER_EMAIL: admin@test.com
          FIRST_SUPERUSER_PASSWORD: testpass123
          APP_BASE_URL: http://localhost:8000
        run: |
          alembic upgrade head
          pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          echo "Add your Railway / Render deploy hook here"
          # curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
